<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPS Adapt' - Grille d'Aménagements</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        @media print {
            .no-print { display: none !important; }
            .print-card { box-shadow: none !important; border: 1px solid #e2e8f0 !important; background: white !important; page-break-inside: avoid; }
            body { background: white !important; }
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-40 no-print">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="bg-indigo-600 text-white p-2 rounded-xl shadow-md">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                </div>
                <div>
                    <h1 class="font-bold text-slate-900 text-lg leading-tight">PPS Adapt'</h1>
                    <p class="text-xs text-slate-500 font-medium">Grille d'aménagements collaboratifs</p>
                </div>
            </div>
            <div class="flex items-center space-x-2">
                <div id="connection-badge" class="px-3.5 py-1.5 rounded-full text-xs font-semibold flex items-center space-x-1.5 bg-amber-50 text-amber-700 border border-amber-200 animate-pulse">
                    <span class="w-2 h-2 rounded-full bg-amber-500"></span>
                    <span>Connexion au Cloud...</span>
                </div>
            </div>
        </div>
    </header>

    <div id="error-toast" class="fixed bottom-5 right-5 z-50 max-w-md bg-red-50 border border-red-200 text-red-800 px-4 py-3 rounded-xl shadow-xl hidden transition-all duration-300">
        <div class="flex items-start space-x-3">
            <svg class="w-5 h-5 text-red-500 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <div>
                <h4 class="font-bold text-sm">Erreur de liaison Firebase</h4>
                <p id="error-toast-msg" class="text-xs text-slate-600 mt-0.5">Vérification...</p>
            </div>
        </div>
    </div>

    <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-6 flex flex-col md:flex-row gap-6">
        
        <section class="w-full md:w-80 shrink-0 flex flex-col gap-4 no-print">
            <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm">
                <div class="flex items-center justify-between mb-3">
                    <h3 class="font-bold text-slate-900 text-sm">Mes Élèves</h3>
                    <span id="student-count" class="bg-slate-100 text-slate-600 text-xs px-2 py-0.5 rounded-full font-bold">0</span>
                </div>
                <div id="students-list" class="space-y-2 max-h-[250px] overflow-y-auto mb-4"></div>
                <button onclick="createNewStudent()" class="w-full bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-semibold py-2.5 px-4 rounded-xl text-sm transition-all flex items-center justify-center space-x-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
                    <span>Ajouter un élève</span>
                </button>
            </div>
        </section>

        <section class="flex-1 flex flex-col gap-6">
            <div id="no-student-selected" class="bg-white border border-slate-200 rounded-3xl p-12 text-center shadow-sm flex flex-col items-center justify-center min-h-[400px]">
                <div class="bg-indigo-50 text-indigo-500 p-4 rounded-full mb-4">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                </div>
                <h3 class="font-bold text-lg text-slate-900">Bienvenue sur votre espace PPS Adapt'</h3>
                <p class="text-sm text-slate-500 mt-2">Sélectionnez un élève ou créez une nouvelle fiche.</p>
            </div>

            <div id="active-student-card" class="hidden flex flex-col gap-6">
                <div class="bg-white border border-slate-200 rounded-3xl p-6 shadow-sm relative">
                    <div class="absolute top-6 right-6 flex items-center space-x-2 no-print">
                        <button onclick="window.print()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold text-xs py-2 px-3.5 rounded-lg transition-all flex items-center space-x-1.5">
                            <span>Imprimer / PDF</span>
                        </button>
                        <button onclick="deleteCurrentStudent()" class="bg-red-50 hover:bg-red-100 text-red-600 font-semibold text-xs py-2 px-3 rounded-lg transition-all">Supprimer</button>
                    </div>

                    <h2 class="text-xs font-bold uppercase tracking-wider text-indigo-600 mb-4">Fiche d'identification</h2>
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Nom / Prénom</label>
                            <input type="text" id="student-name" oninput="updateStudentMeta('name', this.value)" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 text-sm font-semibold focus:outline-none focus:border-indigo-500 focus:bg-white transition-all">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Classe</label>
                            <input type="text" id="student-class" oninput="updateStudentMeta('class', this.value)" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 text-sm font-semibold focus:outline-none focus:border-indigo-500 focus:bg-white transition-all">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">AESH / Référent</label>
                            <input type="text" id="student-referent" oninput="updateStudentMeta('referent', this.value)" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 text-sm font-semibold focus:outline-none focus:border-indigo-500 focus:bg-white transition-all">
                        </div>
                    </div>

                    <div class="mt-6 pt-6 border-t border-slate-100 flex items-center justify-between gap-4">
                        <span id="progress-text" class="text-xs font-bold text-slate-700">0 aménagement(s)</span>
                    </div>
                </div>

                <div id="accommodations-container" class="space-y-6"></div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDA5BV54ESfLQxvklsor5mz2WJQH56qLMM",
            authDomain: "pps-adapt.firebaseapp.com",
            projectId: "pps-adapt",
            storageBucket: "pps-adapt.firebasestorage.app",
            messagingSenderId: "435392408296",
            appId: "1:435392408296:web:20246e84e3b98cf751775d",
            measurementId: "G-ZHE6DTPN0J"
        };

        const AMENAGEMENTS = [
            {
                id: "commun",
                title: "Pour toutes les disciplines",
                color: "indigo",
                items: [
                    "Veiller à la bonne installation de l’élève dans la classe en fonction des temps d’activités",
                    "Attribuer une place, si besoin isolée, à proximité des ressources utiles (prise de courant,…)",
                    "S’adresse individuellement à l’élève",
                    "Etre attentif aux afférences sonores (sensibilité aux bruits)",
                    "Privilégier le canal verbal ou visuel",
                    "Adapter la mise en page des documents",
                    "Ne pas donner de textes manuscrits",
                    "Simplifier le contenu du texte",
                    "Valoriser les réussites, même partielles",
                    "Eviter les doubles tâches (copie pendant une explication...)"
                ]
            },
            {
                id: "eval",
                title: "Évaluations & Devoirs",
                color: "rose",
                items: [
                    "Mettre en place un temps majoré",
                    "Adapter des modalités d’évaluations à l’élève (écrites ou orales)",
                    "Diminuer le nombre d’exercices ou de questions",
                    "Ne pas pénaliser l’orthographe et le soin dans les travaux écrits",
                    "Limiter le « par cœur », demander à ce que seules les notions clés soient retenues"
                ]
            }
        ];

        let app, auth, db;
        let selectedStudentId = null;
        let localData = { students: {} };

        function loadLocalData() {
            const saved = localStorage.getItem('pps_data');
            if (saved) {
                try { localData = JSON.parse(saved); if (!localData.students) localData = { students: localData }; } catch (e) {}
            }
        }

        function saveToLocalStorage() {
            localStorage.setItem('pps_data', JSON.stringify(localData));
        }

        function setConnectionStatus(status, detail = '') {
            const badge = document.getElementById('connection-badge');
            const toast = document.getElementById('error-toast');
            const toastMsg = document.getElementById('error-toast-msg');

            if (status === 'connected') {
                badge.className = "px-3.5 py-1.5 rounded-full text-xs font-semibold flex items-center space-x-1.5 bg-emerald-50 text-emerald-700 border border-emerald-200";
                badge.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500"></span><span>🟢 Connecté au Cloud</span>`;
                toast.classList.add('hidden');
            } else {
                badge.className = "px-3.5 py-1.5 rounded-full text-xs font-semibold flex items-center space-x-1.5 bg-rose-50 text-rose-700 border border-rose-200";
                badge.innerHTML = `<span class="w-2 h-2 rounded-full bg-rose-500"></span><span>🔴 Mode Hors-Ligne</span>`;
                toastMsg.innerText = detail || "Erreur de permissions Firestore.";
                toast.classList.remove('hidden');
            }
        }

        async function startFirebase() {
            try {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        setConnectionStatus('connected');
                        await syncLocalToCloud();
                        listenToFirestore();
                    } else {
                        try { await signInAnonymously(auth); } catch (err) { setConnectionStatus('error', err.message); }
                    }
                });
            } catch (err) {
                setConnectionStatus('error', err.message);
            }
        }

        // CHEMIN DIRECT ET SIMPLE : collection "students" à la racine
        async function syncLocalToCloud() {
            if (!db) return;
            for (let id of Object.keys(localData.students)) {
                const student = localData.students[id];
                if (!student || !student.id) continue;
                try {
                    const docRef = doc(db, 'students', id);
                    const docSnap = await getDoc(docRef);
                    if (!docSnap.exists()) {
                        await setDoc(docRef, student);
                    }
                } catch (e) { console.error(e); }
            }
        }

        function listenToFirestore() {
            if (!db) return;
            onSnapshot(collection(db, 'students'), (snapshot) => {
                snapshot.forEach((doc) => {
                    localData.students[doc.id] = doc.data();
                });
                saveToLocalStorage();
                renderStudentsList();
                if (selectedStudentId) renderActiveStudent();
            }, (error) => {
                setConnectionStatus('error', error.message);
            });
        }

        window.createNewStudent = async function() {
            const id = 'pps_' + Date.now();
            const newStudent = { id, name: "Nouvel Élève", class: "", referent: "", accommodations: {} };
            
            localData.students[id] = newStudent;
            saveToLocalStorage();
            selectedStudentId = id;

            try {
                if (db) await setDoc(doc(db, 'students', id), newStudent);
            } catch (e) { console.error(e); }

            renderStudentsList();
            renderActiveStudent();
        };

        window.updateStudentMeta = async function(field, value) {
            if (!selectedStudentId || !localData.students[selectedStudentId]) return;
            localData.students[selectedStudentId][field] = value;
            saveToLocalStorage();

            try {
                if (db) await updateDoc(doc(db, 'students', selectedStudentId), { [field]: value });
            } catch (e) { console.error(e); }
        };

        window.toggleAccommodation = async function(accId) {
            if (!selectedStudentId || !localData.students[selectedStudentId]) return;
            const student = localData.students[selectedStudentId];
            if (!student.accommodations[accId]) student.accommodations[accId] = { checked: false, comment: "" };

            student.accommodations[accId].checked = !student.accommodations[accId].checked;
            saveToLocalStorage();
            renderActiveStudent();

            try {
                if (db) await updateDoc(doc(db, 'students', selectedStudentId), { accommodations: student.accommodations });
            } catch (e) { console.error(e); }
        };

        window.updateComment = function(accId, value) {
            if (!selectedStudentId || !localData.students[selectedStudentId]) return;
            const student = localData.students[selectedStudentId];
            if (!student.accommodations[accId]) student.accommodations[accId] = { checked: false, comment: "" };

            student.accommodations[accId].comment = value;
            saveToLocalStorage();

            try {
                if (db) updateDoc(doc(db, 'students', selectedStudentId), { accommodations: student.accommodations });
            } catch (e) { console.error(e); }
        };

        window.deleteCurrentStudent = async function() {
            if (!selectedStudentId) return;
            if (confirm("Supprimer cette fiche ?")) {
                const id = selectedStudentId;
                selectedStudentId = null;
                delete localData.students[id];
                saveToLocalStorage();
                try { if (db) await deleteDoc(doc(db, 'students', id)); } catch (e) {}
                renderStudentsList();
                renderActiveStudent();
            }
        };

        function renderStudentsList() {
            const list = document.getElementById('students-list');
            const count = document.getElementById('student-count');
            const keys = Object.keys(localData.students);
            count.innerText = keys.length;
            list.innerHTML = "";

            keys.forEach(id => {
                const s = localData.students[id];
                if (!s || !s.id) return;
                const isSelected = s.id === selectedStudentId;
                const activeCount = Object.values(s.accommodations || {}).filter(a => a.checked).length;

                const item = document.createElement('div');
                item.className = `p-3 rounded-xl border cursor-pointer transition-all ${isSelected ? 'bg-indigo-600 border-indigo-600 text-white shadow-md' : 'bg-slate-50 border-slate-200 hover:bg-slate-100'}`;
                item.onclick = () => { selectedStudentId = s.id; renderStudentsList(); renderActiveStudent(); };
                item.innerHTML = `<div class="flex items-center justify-between"><h4 class="font-bold text-sm truncate">${s.name}</h4><span class="text-[10px] px-2 py-0.5 rounded-full ${isSelected?'bg-indigo-500':'bg-slate-200 text-slate-600'}">${activeCount}</span></div>`;
                list.appendChild(item);
            });
        }

        function renderActiveStudent() {
            const noSel = document.getElementById('no-student-selected');
            const activeCard = document.getElementById('active-student-card');
            if (!selectedStudentId || !localData.students[selectedStudentId]) { noSel.classList.remove('hidden'); activeCard.classList.add('hidden'); return; }
            noSel.classList.add('hidden'); activeCard.classList.remove('hidden');

            const student = localData.students[selectedStudentId];
            document.getElementById('student-name').value = student.name || "";
            document.getElementById('student-class').value = student.class || "";
            document.getElementById('student-referent').value = student.referent || "";

            const checkedCount = Object.values(student.accommodations || {}).filter(a => a.checked).length;
            document.getElementById('progress-text').innerText = `${checkedCount} aménagement(s) actif(s)`;

            const container = document.getElementById('accommodations-container');
            container.innerHTML = "";

            AMENAGEMENTS.forEach(category => {
                const catCard = document.createElement('div');
                catCard.className = `bg-white border border-slate-200 rounded-3xl p-6 shadow-sm print-card`;
                catCard.innerHTML = `<div class="flex items-center space-x-2 mb-4 pb-2 border-b border-slate-100"><h3 class="font-bold text-slate-900">${category.title}</h3></div><div class="space-y-3" id="cat-${category.id}"></div>`;
                container.appendChild(catCard);

                const itemsContainer = document.getElementById(`cat-${category.id}`);
                category.items.forEach((label, index) => {
                    const accId = `${category.id}_${index}`;
                    const state = student.accommodations[accId] || { checked: false, comment: "" };
                    const row = document.createElement('div');
                    row.className = `flex flex-col md:flex-row items-start md:items-center gap-3 p-2 rounded-xl ${state.checked ? 'bg-indigo-50/50':''}`;
                    row.innerHTML = `
                        <button onclick="toggleAccommodation('${accId}')" class="w-5 h-5 rounded border flex items-center justify-center shrink-0 ${state.checked ? 'bg-indigo-600 text-white border-indigo-600':'border-slate-300 bg-white'}">
                            ${state.checked ? '✓':''}
                        </button>
                        <span class="text-sm grow text-slate-700">${label}</span>
                        <input type="text" value="${state.comment || ''}" oninput="updateComment('${accId}', this.value)" placeholder="Note..." class="bg-slate-50 border rounded-lg px-2 py-1 text-xs max-w-xs w-full">
                    `;
                    itemsContainer.appendChild(row);
                });
            });
        }

        window.onload = function() {
            loadLocalData();
            renderStudentsList();
            renderActiveStudent();
            startFirebase();
        };
    </script>
</body>
</html>
